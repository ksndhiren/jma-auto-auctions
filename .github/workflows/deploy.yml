name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  app:
    name: Deploy main app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        # `npm ci` rejects platform-specific optional packages pinned in the
        # lockfile (e.g. @esbuild/aix-ppc64). `npm install` tolerates them.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Patch compatibility_date if in the future
        # Nitro stamps today's runner date; floor to yesterday so Cloudflare
        # never sees a future date. Also inject the main Worker's weekly cron
        # trigger so featured vehicle data refreshes without a second Worker.
        run: |
          node -e "
            const fs=require('fs'), p='.output/server/wrangler.json';
            const cfg=JSON.parse(fs.readFileSync(p,'utf8'));
            const today=new Date(); today.setUTCDate(today.getUTCDate()-1);
            const safe=today.toISOString().slice(0,10);
            if(new Date(cfg.compatibility_date)>new Date(safe)){
              cfg.compatibility_date=safe;
              console.log('Patched compatibility_date to',safe);
            } else {
              console.log('compatibility_date',cfg.compatibility_date,'is fine');
            }
            cfg.triggers = { crons: ['0 6 * * 1'] };
            fs.writeFileSync(p, JSON.stringify(cfg,null,2));
          "

      - name: Deploy app
        # Wrangler auto-discovers the Nitro-generated .wrangler/deploy/config.json
        # which points at .output/server/wrangler.json.
        run: npx --yes wrangler@4 deploy
